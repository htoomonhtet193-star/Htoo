<style>
body{
margin:0;background:linear-gradient(135deg,#ffd6e7,#fff0f5);
font-family:sans-serif;display:flex;justify-content:center;align-items:center;
min-height:100vh;padding:20px;
}
.box{
max-width:420px;background:#fff;padding:20px;border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.2);text-align:center;
}
img{width:100%;border-radius:18px;}
h1{color:#ff4081;}
button{padding:12px 20px;border:none;border-radius:30px;margin:8px;font-size:18px;cursor:pointer;}
#yesBtn{background:#ff4081;color:white;}
#noBtn{background:#ddd;}
#result{display:none;color:#ff4081;font-size:24px;font-weight:bold;line-height:1.8;}
.heart{position:fixed;bottom:-30px;pointer-events:none;animation:fly 4s linear forwards;}
@keyframes fly {
from{transform:translateY(0);opacity:1;}
to{transform:translateY(-120vh);opacity:0;}
}
</style>

<h1>💖 မြတ်နန္ဒာငြိမ်း 💖</h1>
<h2 id="question">ညီမလေးရေ စိတ်ဆိုးပြေပါတော့နော် 🥺❤️</h2>
<div id="btns">
<button id="yesBtn">🥰 ပြေပြီ</button>
<button id="noBtn">😝 မပြေဝူး</button>
</div>
<div id="result"></div>
</div>

<script>
let scale=1;
noBtn.onclick=function(){
scale+=0.4;
yesBtn.style.transform=`scale(${scale})`;
if(scale>3) noBtn.style.display='none';
}

yesBtn.onclick=function(){
question.style.display='none';
btns.style.display='none';
result.style.display='block';
result.innerHTML="💖 ဟီး... စိတ်ဆိုးပြေသွားပြီ<br><br>🥰 ကိုကို အရမ်းပျော်သွားပြီ ❤️<br><br>🌹 ကျေးဇူးတင်ပါတယ် ညီမလေးရေ 🌹";
for(let i=0;i<70;i++){
let h=document.createElement('div');
h.className='heart';
h.innerHTML='💖';
h.style.left=Math.random()*100+'vw';
h.style.fontSize=(20+Math.random()*30)+'px';
document.body.appendChild(h);
setTimeout(()=>h.remove(),4000);
}
}
</script>
</body>
</html>
