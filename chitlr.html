<h1>💖 မြတ်နန္ဒာငြိမ်း 💖</h1>
<p id="question">ကိုကို့ကို ချစ်လား? 🥰</p>
<div class="btns" id="btns">
<button id="yesBtn">💖 ချစ်တယ်</button>
<button id="noBtn">🙈 မချစ်ဘူး</button>
</div>
<div id="love">💖 ကိုကိုလည်း အရမ်းချစ်တယ် 💖<br><br>🥰 Forever Together 🥰</div>
</div>
<script>
let scale=1;
const yes=document.getElementById('yesBtn');
const no=document.getElementById('noBtn');
no.onclick=()=>{
 scale+=0.4;
 yes.style.transform=`scale(${scale})`;
 if(scale>=3) no.style.display='none';
};
yes.onclick=()=>{
 document.getElementById('question').style.display='none';
 document.getElementById('btns').style.display='none';
 document.getElementById('love').style.display='block';
};
</script>
</body>
</html>
